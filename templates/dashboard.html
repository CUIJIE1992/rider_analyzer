<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计仪表盘 - 购房意向智能分析系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🏠</span>
                    <div class="logo-text">
                        <h1>购房意向智能分析系统</h1>
                        <p class="subtitle">AI驱动的房产销售洞察与客户跟进策略</p>
                    </div>
                </div>
                <div class="header-badge">
                    <span class="badge-item">🎯 客户评级</span>
                    <span class="badge-item">📊 意向分析</span>
                    <span class="badge-item">💡 跟进策略</span>
                </div>
            </div>
            <nav class="main-nav">
                <div class="nav-container">
                    <a href="/" class="nav-item">
                        <span class="nav-icon">🏠</span>
                        <span>首页</span>
                    </a>
                    <a href="/history" class="nav-item">
                        <span class="nav-icon">📋</span>
                        <span>历史记录</span>
                    </a>
                    <a href="/dashboard" class="nav-item active">
                        <span class="nav-icon">📊</span>
                        <span>统计仪表盘</span>
                    </a>
                </div>
            </nav>
        </header>

        <div class="dashboard-page">
            <div class="dashboard-header">
                <h2 class="page-title">📊 数据统计仪表盘</h2>
                <div class="date-filter">
                    <label for="startDate">开始日期：</label>
                    <input type="date" id="startDate" class="date-input">
                    <label for="endDate">结束日期：</label>
                    <input type="date" id="endDate" class="date-input">
                    <button class="btn btn-primary btn-small" id="applyFilter">
                        <span>🔍</span> 应用筛选
                    </button>
                    <button class="btn btn-secondary btn-small" id="resetFilter">
                        <span>🔄</span> 重置
                    </button>
                </div>
            </div>

            <div class="stats-cards three-cards">
                <div class="stat-card">
                    <div class="stat-icon">📈</div>
                    <div class="stat-content">
                        <span class="stat-value" id="totalAnalysis">0</span>
                        <span class="stat-label">总分析数</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⭐</div>
                    <div class="stat-content">
                        <span class="stat-value" id="avgScore">0</span>
                        <span class="stat-label">平均意向分</span>
                    </div>
                </div>
                <div class="stat-card highlight">
                    <div class="stat-icon">🏆</div>
                    <div class="stat-content">
                        <span class="stat-value" id="classACount">0</span>
                        <span class="stat-label">A类客户数</span>
                    </div>
                </div>
            </div>

            <div class="charts-grid">
                <div class="chart-card">
                    <div class="chart-header">
                        <h3>🥧 客户等级分布</h3>
                    </div>
                    <div class="chart-body">
                        <canvas id="gradeChart"></canvas>
                    </div>
                </div>

                <div class="chart-card">
                    <div class="chart-header">
                        <h3>📈 分析数量分布</h3>
                    </div>
                    <div class="chart-body">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>

                <div class="chart-card full-width">
                    <div class="chart-header">
                        <h3>📊 关注点排行</h3>
                    </div>
                    <div class="chart-body">
                        <canvas id="concernsChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="dashboard-footer">
                <p class="update-time">数据更新时间：<span id="updateTime">-</span></p>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="loading-spinner"></div>
        <p>加载中...</p>
    </div>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
